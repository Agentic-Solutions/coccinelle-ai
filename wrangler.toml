name = "coccinelle-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"
[vars]
ENVIRONMENT = "production"
N8N_WEBHOOK_URL = "https://coccinelle-n8n.onrender.com"
TWILIO_PHONE_NUMBER = "+33939035760"
TWILIO_PHONE_NUMBER_2 = "+33939035761"
TWILIO_CONVERSATIONS_SERVICE_SID = "ISxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
RESEND_FROM_EMAIL = "sara@coccinelle.ai"
OMNICHANNEL_ENABLED = "true"
FRONTEND_URL = "https://coccinelle.ai"
LIGHTRAG_URL = "https://lightrag.coccinelle.ai"
LIGHTRAG_WORKSPACE = "coccinelle"
GOOGLE_CLIENT_ID = "4699769016-fo6jp6vid80sno7nngjb58o180b1sr3o.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://coccinelle-api.youssef-amrouche.workers.dev/api/v1/oauth/google/callback"
META_APP_ID = "25451229527845708"
META_BUSINESS_ID = "2369569113476967"

# Clé API VoixIA — à configurer via : wrangler secret put VOIXIA_API_KEY
# Utilisée par l'agent vocal VoixIA pour s'authentifier sur /api/v1/voixia/*
# Générer une clé sécurisée : openssl rand -hex 32

# Note: Les secrets suivants doivent être configurés via wrangler secret put:
# - VOIXIA_API_KEY (clé API pour l'agent vocal VoixIA)
# - TWILIO_ACCOUNT_SID
# - TWILIO_AUTH_TOKEN
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - ELEVENLABS_API_KEY (pour Omnichannel TTS)
# - DEEPGRAM_API_KEY (pour Omnichannel transcription)
# - STRIPE_SECRET_KEY (clé secrète Stripe - mode test: sk_test_xxx, mode live: sk_live_xxx)
# - STRIPE_WEBHOOK_SECRET (secret des webhooks Stripe - whsec_xxx)
# - GOOGLE_CLOUD_API_KEY (pour Google Cloud TTS)
# - META_WHATSAPP_ACCESS_TOKEN (token Meta WhatsApp Business API)
# - META_APP_SECRET (secret Meta App)
# - META_WEBHOOK_VERIFY_TOKEN (token de vérification webhook Meta)

[[d1_databases]]
binding = "DB"
database_name = "coccinelle-db-eu"
database_id = "befc34ae-9a65-4aba-998d-ea1d5a88b359"
# Ancien ID US East (ENAM) : f4d7ff42-fc12-4c16-9c19-ada63c023827
# Migré vers EU West (WEUR/CDG) le 28/04/2026

# Workers AI binding pour embeddings gratuits
[ai]
binding = "AI"

# Index Vectorize legacy (OpenAI embeddings - 1536 dimensions)
[[vectorize]]
binding = "VECTORIZE"
index_name = "coccinelle-vectors"

# Nouvel index Vectorize (Workers AI embeddings - 768 dimensions)
[[vectorize]]
binding = "VECTORIZE_V2"
index_name = "coccinelle-vectors-v2"

# R2 bucket pour audio ElevenLabs (Omnichannel)
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "omnichannel-audio"

# ========================================
# EMAIL ROUTING - Réception des emails
# ========================================
# Pour recevoir les emails, le client doit :
# 1. Ajouter son domaine sur Cloudflare
# 2. Configurer Email Routing vers ce Worker
# 3. Ajouter le record MX dans ses DNS



# OAuth Microsoft/Outlook
# MICROSOFT_CLIENT_ID = "à configurer"
# MICROSOFT_CLIENT_SECRET = "à configurer" 
# MICROSOFT_REDIRECT_URI = "https://coccinelle-api.youssef-amrouche.workers.dev/api/v1/oauth/outlook/callback"

# OAuth Yahoo
# YAHOO_CLIENT_ID = "à configurer"
# YAHOO_CLIENT_SECRET = "à configurer"
# YAHOO_REDIRECT_URI = "https://coccinelle-api.youssef-amrouche.workers.dev/api/v1/oauth/yahoo/callback"

[triggers]
crons = ["0 17 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true
